  <style>
    :root{

    body{

      max-width:980px;
      margin:34px auto;
      padding:0 16px;
      line-height:1.6;

        radial-gradient(1200px 700px at 20% 10%, rgba(47,192,214,.10), transparent 55%),

    .topbar{

    .titleRow{

    }

    .badgeIcon{
      width:55px;
      height:55px;
      font-size:35px;
      border-radius:12px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.06);

      box-shadow:0 10px 24px rgba(0,0,0,.35);
    }

    h1{margin:0;font-size:32px;letter-spacing:.2px}
    .subtitle{margin:4px 0 0;color:var(--muted);white-space:pre-line}

    button, a.btn{
      display:inline-flex;
      align-items:center;

      padding:12px 14px;
      border-radius:14px;
      border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.06);
      color:#fff;
      font-weight:800;
      cursor:pointer;
      text-decoration:none;
      transition:transform .05s ease, background .2s ease;

    }

    button:active{transform:translateY(1px)}
    button:disabled{opacity:.5;cursor:not-allowed}

    .langBtn{
      padding:10px 12px;
      border-radius:14px;
      background:rgba(255,255,255,.04);

    .card{
      background:
        linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)),

      border:1px solid var(--border);
      border-radius:22px;
      padding:16px;
      margin:14px 0;
      box-shadow:
        0 22px 60px rgba(0,0,0,.55),
        0 1px 0 rgba(255,255,255,.05) inset;
    }

    .warn{
      background:var(--warn0);
      border:1px solid var(--warn1);
    }

    .emailTextCard pre{
      margin:10px 0 0;
      white-space:pre-wrap;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.10);
      border-radius:14px;
      padding:14px;
      color:rgba(232,242,255,.94);
      font-family:inherit;
      line-height:1.7;
    }

    .panel{
      border-radius:22px;
      padding:16px;
      border:1px solid var(--border);
      background:rgba(255,255,255,.03);
      position:relative;
      overflow:hidden;
      box-shadow:0 18px 44px rgba(0,0,0,.42);
      margin-top:14px;
    }

    .panel::before{
      content:"";
      position:absolute;
      inset:-2px;
      opacity:.22;
      background: radial-gradient(900px 320px at 0% 0%, var(--accent), transparent 55%);
      pointer-events:none;
    }

    .panelHeader{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:10px;
      position:relative;
    }

    .panelTitle{margin:0;font-size:22px;line-height:1.25}

    .pill{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.16);
      background:rgba(0,0,0,.15);
      font-weight:900;
      white-space:nowrap;
    }

    .dot{
      width:10px;
      height:10px;
      border-radius:999px;
      background:var(--accent);
      box-shadow:0 0 0 3px rgba(255,255,255,.06);
    }

    .meta{margin:10px 0 12px;color:var(--muted);position:relative}

    .sendBox{
      position:relative;
      border-radius:18px;
      padding:14px;
      border:1px solid rgba(255,255,255,.10);
      background:rgba(0,0,0,.16);
    }

    .sendBtn{
      width:100%;

      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.16);
      font-size:16px;

    .statusLine{margin-top:10px;color:var(--muted)}

    details{margin-top:10px}

    .mono{

      font-size:.95rem;

      sendBtn:"✅ ارسال ایمیل (باز کردن پیش‌نویس)",

      loaded:(n)=>`بارگذاری شد: ${n} ایمیل`,

        "ارسال نهایی با خود شماست (در اپ ایمیل)."
      ],
      previewSummary:"نمایش موضوع و متن ایمیل",
      subjectLabel:"موضوع:",
      files:"فایل‌ها: mail1.txt + message1.txt",
      dash:"—",
      errorPrefix:"خطا: "
    },

    en: {
      dir:"ltr",
      title:"Austria Email Campaign",
      subtitle:"One click opens a ready draft in your email app.\nThe first recipient is placed in the To field and the remaining recipients are included in the BCC field.\nPlease do not forget to sign the end of the email with your name before sending it.",
      warnTitle:"Note (important):",
      aboutTitle:"Translation of the email message",
      aboutText:`Subject: Freedom and Democracy for Iran

Body:

Dear Members of Parliament,
Dear Decision-Makers,

As a citizen of Iranian origin residing in Austria, I am writing to you with an urgent political request. In light of the continued efforts of the Iranian people to achieve freedom and the rule of law, I call for consistent and unwavering support for this historic transformation process until the complete end of the Islamic Republic.

To ensure a stable transition period and to prevent a power vacuum, I emphasize the central and coordinating role of Crown Prince Reza Pahlavi as the legitimate leader of a transitional administration. His leadership is essential to represent the will of the Iranian people and to guide the democratic transition safely. As Iranians have demonstrated over the past years, and particularly in the past two months during protests both inside and outside the country, they support the leadership of Prince Reza Pahlavi and his team and stand united behind him and his plans for democratic change and reform.

Sincerely`,
      warnText:"In-app browsers (Instagram/X/Telegram) often block mailto:. If it doesn’t work: open the link in Safari/Chrome or choose “Open in browser”.",
      hostingHint:"⚠️ Open this page via GitHub Pages, otherwise the buttons / file loading may not work.",
      toggle:"🌐 DE",

      panelTitle:"Send email to members of the Austrian Parliament",
      panelGroup:"Austrian Parliament",
      panelMeta:"Recipients: email list 1 • Text: message 1",
      sendBtn:"✅ Send email (open draft)",
      statusLabel:"Status: ",
      loaded:(n)=>`Loaded: ${n} emails`,
      bullets:[
        "A draft email with recipients is prepared.",
        "The first recipient goes in To and the rest go in BCC.",
        "Final sending is up to you (in your email app)."
      ],
      previewSummary:"Show subject & body",
      subjectLabel:"Subject:",
      files:"Files: mail1.txt + message1.txt",
      dash:"—",
      errorPrefix:"Error: "
    },

    de: {
      dir:"ltr",
      title:"E-Mail-Aktion Österreich",
      subtitle:"Mit einem Klick öffnet sich ein fertiger Entwurf in Ihrer E-Mail-App.\nDer erste Empfänger wird in das To-Feld gesetzt und die übrigen Empfänger stehen im BCC-Feld.\nBitte unterschreiben Sie die E-Mail am Ende mit Ihrem Namen.",
      warnTitle:"Hinweis (wichtig):",
      aboutTitle:"Übersetzung des E-Mail-Texts",
      aboutText:`Betreff: Freiheit und Demokratie für Iran

Text:

Sehr geehrte Damen und Herren Abgeordnete,
sehr geehrte Entscheidungsträger,

als in Österreich ansässiger Bürger iranischer Herkunft wende ich mich mit einem dringenden politischen Anliegen an Sie. Angesichts der anhaltenden Bestrebungen des iranischen Volkes nach Freiheit und Rechtsstaatlichkeit fordere ich eine konsequente und unverminderte Unterstützung dieses historischen Transformationsprozesses bis zum vollständigen Ende der Islamischen Republik.

Dabei unterstreiche ich die absolute Unantastbarkeit der territorialen Integrität Irans. Jede zukünftige staatliche Ordnung muss auf dem souveränen Willen des iranischen Volkes basieren und den völkerrechtlichen Standards entsprechen.

Um eine stabile Übergangsphase zu gewährleisten und ein Machtvakuum zu verhindern, betone ich ausdrücklich die zentrale und koordinierende Rolle von Kronprinz Reza Pahlavi als legitimen Führer einer Übergangsverwaltung. Seine Führung ist entscheidend, um den Willen des iranischen Volkes zu repräsentieren und den demokratischen Übergang sicher zu gestalten. Die Iranerinnen und Iraner haben in den vergangenen Jahren und insbesondere in den letzten Monaten während der Proteste im In- und Ausland gezeigt, dass sie die Führung von Prinz Reza Pahlavi und seinem Team unterstützen und geschlossen hinter ihm sowie seinen Plänen für demokratischen Wandel und Reformen stehen.

Ich appelliere an Sie, im Rahmen Ihres Mandats dafür zu sorgen, dass die Republik Österreich eine klare politische Haltung einnimmt und die Freiheit, die Menschenrechte sowie die demokratischen Bestrebungen des iranischen Volkes unterstützt.

Mit freundlichen Grüßen`,
      warnText:"In-App-Browser (Instagram/X/Telegram) blockieren oft mailto:. Wenn es nicht klappt: Link im normalen Browser öffnen (Safari/Chrome) oder „In Browser öffnen“ wählen.",
      hostingHint:"⚠️ Diese Seite muss über GitHub Pages geöffnet werden, sonst funktionieren Buttons/Dateien evtl. nicht.",
      toggle:"🌐 FA",

      panelTitle:"E-Mail an Mitglieder des österreichischen Parlaments senden",
      panelGroup:"Österreichisches Parlament",
      panelMeta:"Empfänger: E-Mail-Liste 1 • Text: Nachricht 1",
      sendBtn:"✅ E-Mail senden (Entwurf öffnen)",
      statusLabel:"Status: ",
      loaded:(n)=>`Geladen: ${n} E-Mails`,
      bullets:[
        "Ein Entwurf mit Empfängern wird vorbereitet.",
        "Der erste Empfänger steht in To, die übrigen stehen in BCC.",
        "Das endgültige Senden machst du in deiner Mail-App."
      ],
      previewSummary:"Betreff & Text anzeigen",
      subjectLabel:"Betreff:",
      files:"Dateien: mail1.txt + message1.txt",
      dash:"—",
      errorPrefix:"Fehler: "
    }

  const PANEL = {
    mailFile:"mail1.txt",
    msgFile:"message1.txt",
    emails:[],
    subject:"",
    body:"",
    loaded:false,
    error:""
  };

  function setLang(lang){
    LANG = lang;
    const t = UI[LANG];

    document.documentElement.lang = LANG;
    document.documentElement.dir = t.dir;
    document.title = t.title;

    document.getElementById("pageTitle").textContent = t.title;
    document.getElementById("pageSubtitle").textContent = t.subtitle;
    document.getElementById("warnTitle").textContent = t.warnTitle + " ";
    document.getElementById("warnText").textContent = t.warnText;
    document.getElementById("hostingHint").textContent = t.hostingHint;
    document.getElementById("langBtn").textContent = t.toggle;
    document.getElementById("aboutTitle").textContent = t.aboutTitle;
    document.getElementById("aboutText").textContent = t.aboutText;

    document.getElementById("panelTitle").textContent = t.panelTitle;
    document.getElementById("pillLabel").textContent = t.panelGroup;
    document.getElementById("panelMeta").textContent = t.panelMeta;
    document.getElementById("sendBtn").textContent = t.sendBtn;
    document.getElementById("statusLabel").textContent = t.statusLabel;
    document.getElementById("previewSummary").textContent = t.previewSummary;
    document.getElementById("previewSubjectLabel").textContent = t.subjectLabel;
    document.getElementById("files").textContent = t.files;

    renderPanel();
  }

  document.getElementById("langBtn").addEventListener("click", () => {
    const next = (LANG === "fa") ? "en" : (LANG === "en") ? "de" : "fa";
    setLang(next);
  });

  function normalizeEmails(text){
    return text
      .split(/\r?\n/)
      .map(l => l.trim())
      .filter(Boolean)
      .filter(l => !l.startsWith("#"));
  }

  function parseMessage(text){
    const subjectLine = text.match(/^SUBJECT:\s*(.*)$/m);
    const bodySplit = text.split(/^\s*BODY:\s*$/m);

    const subject = subjectLine ? subjectLine[1].trim() : "";
    const body = (bodySplit.length > 1) ? bodySplit.slice(1).join("\n").trim() : "";
    return { subject, body };
  }

  function buildMailto(emails, subject, body){
    const to = emails[0] || "";
    const bccList = emails.slice(1);

    const toEncoded = encodeURIComponent(to);
    const bccEncoded = encodeURIComponent(bccList.join(","));
    const s = encodeURIComponent(subject || "");
    const b = encodeURIComponent(body || "");

    let url = `mailto:${toEncoded}?subject=${s}&body=${b}`;

    if (bccList.length > 0) {
      url += `&bcc=${bccEncoded}`;
    }

    return url;
  }

  function setPanelError(msg){
    PANEL.error = msg;
    const errEl = document.getElementById("error");
    errEl.textContent = msg ? (" — " + msg) : "";
  }

  function renderPanel(){
    const t = UI[LANG];

    document.getElementById("status").textContent = PANEL.loaded ? t.loaded(PANEL.emails.length || 0) : t.loaded(0);

    const ul = document.getElementById("bullets");
    ul.innerHTML = "";
    for(const line of t.bullets){
      const li = document.createElement("li");
      li.textContent = line;
      ul.appendChild(li);
    }

    document.getElementById("previewSubject").textContent = PANEL.subject || t.dash;
    document.getElementById("previewBody").textContent = PANEL.body || t.dash;

    const ready = PANEL.loaded && PANEL.emails.length > 0 && (PANEL.subject.length > 0 || PANEL.body.length > 0) && !PANEL.error;
    document.getElementById("sendBtn").disabled = !ready;
  }

  async function loadPanel(){
    setPanelError("");

    try{
      const [mailRes, msgRes] = await Promise.all([
        fetch(PANEL.mailFile, { cache:"no-store" }),
        fetch(PANEL.msgFile, { cache:"no-store" })
      ]);

      if(!mailRes.ok) throw new Error(`${PANEL.mailFile} not found`);
      if(!msgRes.ok) throw new Error(`${PANEL.msgFile} not found`);

      const [mailTxt, msgTxt] = await Promise.all([mailRes.text(), msgRes.text()]);

      PANEL.emails = normalizeEmails(mailTxt);
      const parsed = parseMessage(msgTxt);
      PANEL.subject = parsed.subject;
      PANEL.body = parsed.body;
      PANEL.loaded = true;

      renderPanel();
    }catch(e){
      PANEL.loaded = false;
      PANEL.emails = [];
      PANEL.subject = "";
      PANEL.body = "";
      setPanelError(UI[LANG].errorPrefix + e.message);
      renderPanel();
    }
  }

  document.getElementById("sendBtn").addEventListener("click", () => {
    if(!PANEL.loaded || !PANEL.emails.length) return;
    window.location.href = buildMailto(PANEL.emails, PANEL.subject, PANEL.body);
  });

  (async function init(){
    setLang("fa");
    await loadPanel();
    renderPanel();
  })();
</script>

</body>
