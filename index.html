<!doctype html>
<html lang="fa" dir="rtl">
<head>

<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Email campaign – Austria</title>

<meta property="og:title" content="Austria email campaign">
<meta property="og:description" content="Send email to members of the Austrian parliament">
<meta property="og:type" content="website">

<style>

:root{
--bg0:#07131c;
--bg1:#071a26;
--bg2:#061018;
--card0:#0e2533;
--card1:#0b1f2c;
--border:rgba(255,255,255,.10);
--text:#e8f2ff;
--muted:rgba(232,242,255,.78);
--accent:#c9a96b;
--info0:rgba(201,169,107,.10);
--info1:rgba(201,169,107,.28);
--inputBg:rgba(255,255,255,.06);
}

body{
font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
max-width:980px;
margin:34px auto;
padding:0 16px 30px;
line-height:1.6;
color:var(--text);
background:
radial-gradient(1200px 700px at 20% 10%, rgba(47,192,214,.10), transparent 55%),
radial-gradient(900px 600px at 80% 0%, rgba(60,120,255,.10), transparent 50%),
linear-gradient(180deg, var(--bg1), var(--bg0) 55%, var(--bg2));
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:14px;
}

.titleRow{
display:flex;
align-items:center;
gap:12px;
}

.badgeIcon{
width:55px;
height:55px;
font-size:35px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
background:rgba(255,255,255,.06);
border:1px solid var(--border);
}

h1{margin:0;font-size:32px}

.subtitle{
margin:4px 0 0;
color:var(--muted);
white-space:pre-line;
}

button{
padding:12px 14px;
border-radius:14px;
border:1px solid rgba(255,255,255,.14);
background:rgba(255,255,255,.06);
color:#fff;
font-weight:700;
cursor:pointer;
}

.card{
background:
linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03)),
linear-gradient(180deg, var(--card0), var(--card1));
border:1px solid var(--border);
border-radius:22px;
padding:16px;
margin:14px 0;
}

.emailTextCard pre{
white-space:pre-wrap;
background:rgba(0,0,0,.18);
border-radius:14px;
padding:14px;
}

.signatureCard{
background:var(--info0);
border:1px solid var(--info1);
}

.nameInput{
width:100%;
padding:14px;
border-radius:14px;
border:1px solid rgba(255,255,255,.14);
background:var(--inputBg);
color:#fff;
font-size:16px;
}

.panel{
border-radius:22px;
padding:16px;
border:1px solid var(--border);
background:rgba(255,255,255,.03);
margin-top:14px;
}

.sendBtn{
width:100%;
padding:14px;
border-radius:16px;
font-size:16px;
}

pre.mono{
white-space:pre-wrap;
background:rgba(0,0,0,.22);
border-radius:14px;
padding:12px;
}

</style>
</head>

<body>

<div class="topbar">
<div class="titleRow">
<div class="badgeIcon">🕊️</div>
<div>
<h1 id="pageTitle"></h1>
<div class="subtitle" id="pageSubtitle"></div>
</div>
</div>

<button id="langBtn"></button>
</div>


<div class="card emailTextCard">
<h2 id="aboutTitle"></h2>
<pre id="aboutText"></pre>
</div>


<div class="card signatureCard">

<h2 id="signatureTitle"></h2>

<p id="signatureNote"></p>

<input id="fullName" class="nameInput" type="text">

</div>


<div class="panel">

<h2 id="panelTitle"></h2>

<button class="sendBtn" id="sendBtn" disabled></button>

<div>
<b id="previewSubjectLabel"></b>
<span id="previewSubject"></span>
</div>

<pre class="mono" id="previewBody"></pre>

</div>



<script>

let LANG="fa"


const UI={


fa:{
dir:"rtl",

title:"کمپین ایمیل اتریش",

subtitle:
"با یک کلیک پیش‌نویس ایمیل باز می‌شود.\nگیرنده اول در To و بقیه در Bcc قرار می‌گیرند.",

aboutTitle:"ترجمه متن ایمیل",

aboutText:`موضوع: آزادی و دموکراسی برای ایران

نمایندگان محترم پارلمان،
تصمیم‌گیرندگان گرامی،

به عنوان شهروندی با ریشه ایرانی که در اتریش زندگی می‌کنم، از شما می‌خواهم از تلاش‌های مردم ایران برای آزادی، دموکراسی و حاکمیت قانون حمایت کنید.

تمامیت ارضی ایران باید حفظ شود و هر نظام سیاسی آینده باید بر اساس اراده مردم ایران و مطابق با قوانین بین‌المللی شکل بگیرد.

برای جلوگیری از خلأ قدرت، بسیاری از ایرانیان از نقش شاهزاده رضا پهلوی به عنوان رهبر دوران گذار حمایت می‌کنند.

از شما درخواست می‌کنم جمهوری اتریش از آزادی، حقوق بشر و خواسته‌های دموکراتیک مردم ایران حمایت کند.`,

signatureTitle:"امضا",

signatureNote:
"لطفاً نام خود را برای امضا وارد کنید تا به ایمیل ارزش بیشتری بدهد.\nدر صورت تمایل می‌توانید متن ایمیل را کمی تغییر دهید تا همه ایمیل‌ها کاملاً یکسان نباشند.\nما هیچ‌یک از این اطلاعات را ذخیره نمی‌کنیم.\nاگر به این پلتفرم برای کشورهای دیگر نیاز دارید به ما اطلاع دهید.",

toggle:"EN",

panelTitle:"ارسال ایمیل به اعضای پارلمان اتریش",

sendBtn:"ارسال ایمیل",

subjectLabel:"موضوع:"

},



en:{
dir:"ltr",

title:"Austria email campaign",

subtitle:
"One click opens a ready email draft.\nThe first recipient goes to To and the others to Bcc.",

aboutTitle:"Email message translation",

aboutText:`Subject: Freedom and democracy for Iran

Dear Members of Parliament,
Dear Decision Makers,

As a citizen of Iranian origin living in Austria, I respectfully ask for continued support for the Iranian people's struggle for freedom and democracy.

Iran’s territorial integrity must remain intact and any future political system must reflect the will of the Iranian people.

Many Iranians support Crown Prince Reza Pahlavi as a key figure for a democratic transition.

I respectfully urge Austria to support the Iranian people’s democratic aspirations.`,

signatureTitle:"Signature",

signatureNote:
"Please write your name to add a signature and give more value to the email.\nYou may also slightly adjust the email text so messages are not completely identical.\nWe do not store your name or any data anywhere.\nIf you would like to use this platform for other countries, please let us know.",

toggle:"DE",

panelTitle:"Send email to members of the Austrian Parliament",

sendBtn:"Send email",

subjectLabel:"Subject:"

},



de:{
dir:"ltr",

title:"E-Mail Kampagne Österreich",

subtitle:
"Mit einem Klick öffnet sich ein E-Mail-Entwurf.\nDer erste Empfänger steht im To Feld, die anderen im Bcc.",

aboutTitle:"Übersetzung des E-Mail Textes",

aboutText:`Betreff: Freiheit und Demokratie für Iran

Sehr geehrte Damen und Herren Abgeordnete,
sehr geehrte Entscheidungsträger,

als in Österreich ansässiger Bürger iranischer Herkunft wende ich mich mit einem dringenden politischen Anliegen an Sie. Angesichts der anhaltenden Bestrebungen des iranischen Volkes nach Freiheit und Rechtsstaatlichkeit fordere ich eine konsequente und unverminderte Unterstützung dieses historischen Transformationsprozesses bis zum vollständigen Ende der Islamischen Republik.

Dabei unterstreiche ich die absolute Unantastbarkeit der territorialen Integrität Irans. Jede zukünftige staatliche Ordnung muss auf dem souveränen Willen des iranischen Volkes basieren und den völkerrechtlichen Standards entsprechen.

Um eine stabile Übergangsphase zu gewährleisten und ein Machtvakuum zu verhindern, betone ich ausdrücklich die zentrale und koordinierende Rolle von Kronprinz Reza Pahlavi als legitimen Führer einer Übergangsverwaltung.

Ich appelliere an Sie, im Rahmen Ihres Mandats dafür zu sorgen, dass die Republik Österreich eine klare politische Haltung einnimmt und die Freiheit, die Menschenrechte sowie die demokratischen Bestrebungen des iranischen Volkes unterstützt.`,

signatureTitle:"Unterschrift",

signatureNote:
"Bitte tragen Sie Ihren Namen für die Signatur ein, um der E-Mail mehr Gewicht zu geben.\nSie können den Text auch leicht anpassen, damit die Nachrichten nicht völlig identisch sind.\nWir speichern Ihren Namen oder andere Daten nicht.\nWenn Sie diese Plattform auch für andere Länder nutzen möchten, lassen Sie es uns wissen.",

toggle:"FA",

panelTitle:"E-Mail an Mitglieder des österreichischen Parlaments senden",

sendBtn:"E-Mail senden",

subjectLabel:"Betreff:"

}

}



const EMAIL={
subject:"Freiheit und Demokratie für Iran",
body:`Sehr geehrte Damen und Herren Abgeordnete,

als in Österreich ansässiger Bürger iranischer Herkunft ...`
}



function setLang(l){

LANG=l
const t=UI[l]

document.documentElement.dir=t.dir

pageTitle.textContent=t.title
pageSubtitle.textContent=t.subtitle
aboutTitle.textContent=t.aboutTitle
aboutText.textContent=t.aboutText

signatureTitle.textContent=t.signatureTitle
signatureNote.textContent=t.signatureNote

panelTitle.textContent=t.panelTitle
sendBtn.textContent=t.sendBtn

previewSubjectLabel.textContent=t.subjectLabel
previewSubject.textContent=EMAIL.subject
previewBody.textContent=EMAIL.body

langBtn.textContent=t.toggle

}



langBtn.onclick=()=>{

if(LANG==="fa") setLang("en")
else if(LANG==="en") setLang("de")
else setLang("fa")

}



sendBtn.onclick=()=>{

const name=fullName.value.trim()

let body=EMAIL.body

if(name) body=body+"\n\n"+name

const to="example@email.at"
const bcc="example2@email.at"

const url=`mailto:${to}?bcc=${bcc}&subject=${encodeURIComponent(EMAIL.subject)}&body=${encodeURIComponent(body)}`

window.location.href=url

}


setLang("fa")

sendBtn.disabled=false

</script>

</body>
</html>
